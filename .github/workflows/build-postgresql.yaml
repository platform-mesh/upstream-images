name: Build postgresql Image

concurrency:
  group: postgresql-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "The commit hash of the image to be build"
        # renovate: datasource=custom.bitnamiPostgresqlCommits depName=bitnami/containers
        default: "56273540e12af6a40bdef18bb52ff7c081a0fa5f"
        required: true
      image_tag:
        description: "The tag to be created"
        # renovate: datasource=custom.bitnamiPostgresqlTagFromDockerfile depName=bitnami/containers versioning=loose
        default: "17.4.0-debian-12-r17"
        required: true
      image_context_path:
        description: "The path to the directory holding the dockerfile"
        default: "bitnami/postgresql/18/debian-12"
        required: true

env:
  IMAGE_REF: ${{ github.event.inputs.image_ref }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || '17.4.0-debian-12-r17' }}
  IMAGE_CONTEXT_PATH: ${{ github.event.inputs.image_context_path || 'bitnami/postgresql/18/debian-12' }}

permissions:
  contents: read

jobs:
  build-image:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed for docker/build-push-action to push the image to the registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: bitnami/containers
          ref: ${{ env.IMAGE_REF }}
          fetch-depth: '1'
          persist-credentials: false
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          push: true
          platforms: 'linux/amd64,linux/arm64'
          tags: ghcr.io/platform-mesh/upstream-images/postgresql:${{ env.IMAGE_TAG }}
          context: ${{ env.IMAGE_CONTEXT_PATH }}
